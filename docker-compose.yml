services:
  gork:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - ./logs:/usr/src/app/logs

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
